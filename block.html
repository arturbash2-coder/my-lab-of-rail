<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Railway Signal Logic - Flawless Edition</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#111;font-family:'Courier New',monospace;
    min-height:100vh;display:flex;flex-direction:column;
    overflow:hidden;user-select:none;
  }
  .grid-bg{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background-image:linear-gradient(to right,#181818 1px,transparent 1px),
                     linear-gradient(to bottom,#181818 1px,transparent 1px);
    background-size:24px 24px;z-index:0;
  }
  .header{
    position:relative;z-index:10;width:100%;padding:12px 20px;
    background:#111b;border-bottom:1px solid #1e1e1e;
    display:flex;align-items:center;font-family:'Courier New', monospace;
  }
  .nav-back, .step-lbl { flex: 1; }
  .header-logo { flex: 1; text-align: center; color: #4ade80; font-weight: 700; font-size: 11px; letter-spacing: .06em; }
  .nav-back { color: #4ade80; text-decoration: none; font-size: 11px; font-weight: 700; transition: opacity 0.2s; }
  .nav-back:hover { opacity: 0.7; }
  .step-lbl { text-align: left; color: #7a7870; font-size: 11px; }

  .canvas-wrap{position:relative;z-index:1;flex:1;width:100%}
  svg{display:block}

  #controls-panel {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    width: 95%; max-width: 900px;
    display: flex; gap: 15px; background: #1a1a1ee0;
    border: 1px solid #333; border-radius: 8px; padding: 15px 25px;
    backdrop-filter: blur(10px); z-index: 100; align-items: center;
  }
  .control-btn {
    background: #2a2a2e; border: 1px solid #444; color: #fff;
    padding: 8px 16px; border-radius: 6px; font-family: 'Courier New'; font-weight: 700;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .control-btn:hover { background: #4ade80; color: #111; border-color: #4ade80; }
  .control-btn:active { transform: scale(0.95); }
  
  #caption-text { flex-grow: 1; text-align: center; }
  #caption-title { font-size: 15px; font-weight: 700; color: #4ade80; margin-bottom: 4px; }
  #caption-body { font-size: 13px; color: #ccc; }

  @media (max-width: 768px) {
    #controls-panel { bottom: 15px; padding: 12px 15px; flex-wrap: wrap; gap: 10px; }
    #caption-text { order: -1; width: 100%; margin-bottom: 5px; }
    .control-btn { flex: 1; padding: 10px 5px; font-size: 12px; text-align: center; }
  }

  .wire{stroke:#1e1e1e;stroke-width:3;fill:none;stroke-linecap:square;stroke-linejoin:miter;transition:stroke 0.5s,filter 0.5s}
  .wire.green  {stroke:#22c55e;filter:drop-shadow(0 0 4px #22c55ebb)}
  .wire.red    {stroke:#ef4444;filter:drop-shadow(0 0 4px #ef4444bb)}

  .cbox{fill:#131313;stroke:#2a2a2a;stroke-width:1.5;transition:fill 0.5s,stroke 0.5s}
  .cbox.ag{stroke:#22c55e;fill:#0d190d}
  .cbox.ar{stroke:#ef4444;fill:#190d0d}

  .clbl{font-size:8.5px;fill:#3a3a3a;text-anchor:middle;dominant-baseline:middle;font-family:'Courier New';font-weight:700;letter-spacing:.05em;transition:fill .4s}
  .clbl.on{fill:#fff}
  .ilock{fill:none;stroke:#222;stroke-width:1.5;stroke-dasharray:6 4}
  .pole{fill:#171717;stroke:#222;stroke-width:1}
  .scase{fill:#0b0b0b;stroke:#1e1e1e;stroke-width:1.5}
  
  .lens{fill:#080808;stroke:#141414;stroke-width:2;transition:fill .35s,filter .35s}
  .lens.lg{fill:#22c55e;filter:drop-shadow(0 0 14px #22c55ecc)}
  .lens.lr{fill:#ef4444;filter:drop-shadow(0 0 14px #ef4444cc)}

  #train-group { transform: translateX(-200px); }
  #train-group.driving { transform: translateX(1350px); transition: transform 3.8s linear; }
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="header">
  <a href="index.html" class="nav-back">← חזרה למעבדות</a>
  <span class="header-logo">LAB / סימנור קטע + רכבת</span>
  <span class="step-lbl" id="step-lbl">שלב 0 / 1</span>
</div>

<div class="canvas-wrap">
<svg width="100%" height="100%" viewBox="0 0 1300 555" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <rect class="ilock" x="20" y="42" width="238" height="298" rx="3"/><text class="clbl" x="36" y="350" text-anchor="start" style="font-size:9px;fill:#222;letter-spacing:.12em">INTERLOCKING SYSTEM</text>
  <rect class="cbox" id="bx-blk" x="38" y="150" width="112" height="36" rx="4"/><text class="clbl" id="lb-blk" x="94" y="168">גרופ קטע</text>
  <rect class="cbox" id="bx-db1" x="170" y="58" width="44" height="260" rx="4"/><text class="clbl" id="lb-db1" x="192" y="188" transform="rotate(-90,192,188)">DB BOARD</text>
  <path class="wire" id="w-blk" d="M150 168 H170"/><path class="wire" id="w-1" d="M192 318 V430 H355"/>
  <rect class="cbox" id="bx-db2" x="355" y="355" width="44" height="148" rx="4"/><text class="clbl" id="lb-db2" x="377" y="429" transform="rotate(-90,377,429)">DB BOARD</text>
  <rect class="pole" x="1210" y="35" width="7" height="485"/>
  <rect class="cbox" id="bx-id" x="1191.5" y="285" width="44" height="140" rx="4"/><text class="clbl" id="lb-id" x="1213.5" y="355" transform="rotate(-90,1213.5,355)">INSERT BOX</text>
  <path class="wire" id="w-2" d="M399 430 H1213.5 V425"/>
  <path class="wire" id="w-3" d="M1213.5 285 V160"/>
  <rect class="scase" x="1178" y="40" width="71" height="140" rx="7"/>
  <circle class="lens" id="m-green" cx="1213.5" cy="80" r="21"/>
  <circle class="lens" id="m-red" cx="1213.5" cy="140" r="21"/>
  <text class="clbl" x="1213.5" y="195" style="font-size:10px;">BLOCK SIGNAL</text>
  <line x1="0" y1="520" x2="1300" y2="520" stroke="#333" stroke-width="4" stroke-dasharray="24 12" />
  <g id="train-group">
    <rect x="0" y="470" width="130" height="35" rx="6" fill="#1d4ed8" stroke="#1e3a8a" stroke-width="2"/>
    <rect x="90" y="478" width="30" height="12" rx="3" fill="#1e1e24" />
    <rect x="50" y="478" width="30" height="12" rx="3" fill="#1e1e24" />
    <rect x="10" y="478" width="30" height="12" rx="3" fill="#1e1e24" />
    <circle cx="30" cy="512" r="8" fill="#555" stroke="#111" stroke-width="2"/>
    <circle cx="100" cy="512" r="8" fill="#555" stroke="#111" stroke-width="2"/>
  </g>
</svg>
</div>

<div id="controls-panel">
  <button class="control-btn" onclick="prev()">◀ הקודם</button>
  <button class="control-btn" onclick="reset()" style="background:#333;">איפוס ↺</button>
  <div id="caption-text">
    <div id="caption-title">מצב 0: קטע פנוי</div>
    <div id="caption-body">המתן להוראה</div>
  </div>
  <button class="control-btn" onclick="next()">הבא ▶</button>
</div>

<script>
let step = 0;
const TOTAL = 1;
const ALL_W = ['w-blk','w-1','w-2','w-3'];
const ALL_B = ['bx-blk','bx-db1','bx-db2','bx-id'];
const ALL_L = ['m-green','m-red'];

let timeouts = [];

function clearAllTimeouts() {
  timeouts.forEach(t => clearTimeout(t));
  timeouts = [];
}

function clearAll() {
  clearAllTimeouts();
  ALL_W.forEach(id => { const e = document.getElementById(id); if(e) e.classList.remove('red','green'); });
  ALL_B.forEach(id => { const e = document.getElementById(id); if(e) e.classList.remove('ar','ag'); });
  document.querySelectorAll('.clbl').forEach(e => e.classList.remove('on'));
  ALL_L.forEach(id => { const e = document.getElementById(id); if(e) e.classList.remove('lr','lg'); });
  document.getElementById('train-group').style.transition = 'none';
  document.getElementById('train-group').classList.remove('driving');
}

function W(ids, c) { ids.forEach(id => { const e = document.getElementById(id); if(e) { e.classList.remove('red','green'); e.classList.add(c); }}); }
function B(ids, c) {
  const m = { red:'ar', green:'ag' };
  ids.forEach(id => {
    const e = document.getElementById(id); if(e) { e.classList.remove('ar','ag'); e.classList.add(m[c]); }
    const lb = document.getElementById(id.replace('bx-','lb-')); if(lb) lb.classList.add('on');
  });
}
function L(id, c) {
  const m = { red:'lr', green:'lg' };
  const e = document.getElementById(id); if(e) { e.classList.remove('lr','lg'); e.classList.add(m[c]); }
}

function T(fn, delay) { timeouts.push(setTimeout(fn, delay)); }

function render() {
  clearAll();
  document.getElementById('step-lbl').textContent = `שלב ${step} / ${TOTAL}`;
  
  if(step === 0) {
    document.getElementById('caption-title').textContent = 'מצב 0: קטע פנוי — סימנור ירוק';
    document.getElementById('caption-body').textContent = 'מצב ברירת מחדל.';
    
    T(() => B(['bx-blk'], 'green'), 0);
    T(() => W(['w-blk'], 'green'), 200);
    T(() => B(['bx-db1'], 'green'), 400);
    T(() => W(['w-1'], 'green'), 600);
    T(() => B(['bx-db2'], 'green'), 800);
    T(() => W(['w-2'], 'green'), 1000);
    T(() => B(['bx-id'], 'green'), 1200);
    T(() => W(['w-3'], 'green'), 1400);
    T(() => L('m-green', 'green'), 1800);

  } else if(step === 1) {
    document.getElementById('caption-title').textContent = 'מצב 1: מעבר רכבת — סימנור אדום';
    document.getElementById('caption-body').textContent = 'הקטע ננעל.';
    
    // רכבת נוסעת
    setTimeout(() => {
      document.getElementById('train-group').style.transition = 'transform 3.8s linear';
      document.getElementById('train-group').classList.add('driving');
    }, 50);
    
    // מפעיל ירוק בבסיס (כמו ברענון)
    B(ALL_B, 'green'); W(ALL_W, 'green'); L('m-green', 'green');
    
    // אדום "רודף" ומשתלט
    T(() => B(['bx-blk'], 'red'), 1000);
    T(() => W(['w-blk'], 'red'), 1300);
    T(() => B(['bx-db1'], 'red'), 1600);
    T(() => W(['w-1'], 'red'), 1900);
    T(() => B(['bx-db2'], 'red'), 2200);
    T(() => W(['w-2'], 'red'), 2500);
    T(() => B(['bx-id'], 'red'), 2800);
    T(() => W(['w-3'], 'red'), 3100);
    T(() => { 
        document.getElementById('m-green').classList.remove('lg');
        L('m-red', 'red'); 
    }, 3200);
  }
}

function next() { if(step < TOTAL) { step++; render(); } }
function prev() { if(step > 0) { step--; render(); } }
function reset() { step = 0; render(); }

document.addEventListener('keydown', e => {
  if(e.code === 'ArrowRight' || e.code === 'Space') next();
  if(e.code === 'ArrowLeft') prev();
  if(e.code === 'Escape') reset();
});

render();
</script>
</body>
</html>
