<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Railway Signal Logic - Flawless Edition</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#111;font-family:'Courier New',monospace;
  min-height:100vh;display:flex;flex-direction:column;
  overflow:hidden;user-select:none;
}
.grid-bg{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background-image:linear-gradient(to right,#181818 1px,transparent 1px),
                   linear-gradient(to bottom,#181818 1px,transparent 1px);
  background-size:24px 24px;z-index:0;
}
.header{
  position:relative;z-index:10;width:100%;padding:8px 18px;
  background:#111b;border-bottom:1px solid #1e1e1e;
  display:flex;align-items:center;justify-content:space-between;
  font-size:11px;color:#4ade80;font-weight:700;letter-spacing:.06em;
}
.step-lbl{color:#383838;font-size:11px}
.canvas-wrap{position:relative;z-index:1;flex:1;width:100%}
svg{display:block}

/* Wires styling and active states */
.wire{stroke:#1e1e1e;stroke-width:3;fill:none;stroke-linecap:square;stroke-linejoin:miter;transition:stroke .4s,filter .4s}
.wire.red    {stroke:#ef4444;filter:drop-shadow(0 0 4px #ef4444bb)}
.wire.yellow {stroke:#fbbf24;filter:drop-shadow(0 0 4px #fbbf24bb)}
.wire.green  {stroke:#22c55e;filter:drop-shadow(0 0 4px #22c55ebb)}

/* Boxes and Interlocking */
.cbox{fill:#131313;stroke:#2a2a2a;stroke-width:1.5;transition:fill .4s,stroke .4s}
.cbox.ar{stroke:#ef4444;fill:#190d0d}
.cbox.ay{stroke:#fbbf24;fill:#191700}
.cbox.ag{stroke:#22c55e;fill:#0d190d}

.clbl{font-size:8.5px;fill:#3a3a3a;text-anchor:middle;dominant-baseline:middle;
      font-family:'Courier New';font-weight:700;letter-spacing:.05em;transition:fill .4s}
.clbl.on{fill:#999}

.ilock{fill:none;stroke:#222;stroke-width:1.5;stroke-dasharray:6 4}
.pole{fill:#171717;stroke:#222;stroke-width:1}
.scase{fill:#0b0b0b;stroke:#1e1e1e;stroke-width:1.5}

/* Signal Lenses */
.lens{fill:#080808;stroke:#141414;stroke-width:2;transition:fill .35s,filter .35s}
.lens.ly{fill:#fbbf24;filter:drop-shadow(0 0 14px #fbbf24cc)}
.lens.lg{fill:#22c55e;filter:drop-shadow(0 0 14px #22c55ecc)}
.lens.lr{fill:#ef4444;filter:drop-shadow(0 0 14px #ef4444cc)}

/* Controls Panel */
.bottom-panel{
  position:relative;z-index:10;width:100%;background:#0f0f0fb0;
  border-top:1px solid #1a1a1a;padding:10px 20px;
  display:flex;align-items:center;gap:14px;
}
.btn{
  background:#151515;border:1px solid #282828;color:#777;
  padding:7px 16px;border-radius:4px;font-family:'Courier New';
  font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap;
}
.btn:hover{background:#4ade80;color:#111;border-color:#4ade80}
.caption{text-align:center;flex:1}
.cap-title{font-size:14px;font-weight:700;color:#4ade80;margin-bottom:4px}
.cap-body{font-size:12px;color:#777}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="header">
  <span class="header-logo">LAB / איתות רכבתי</span>
  <a href="index.html" class="nav-back">← חזרה למעבדות</a>
  <span class="step-lbl" id="step-lbl">שלב 0 / 2</span>
</div>

<div class="canvas-wrap">
<svg width="100%" height="100%" viewBox="0 0 1300 555" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="aL" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M8 1L2 5L8 9" fill="none" stroke="#222" stroke-width="1.5"/>
    </marker>
    <marker id="aR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#222" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect class="ilock" x="20" y="42" width="238" height="298" rx="3"/>
  <text class="clbl" x="36" y="350" text-anchor="start"
        style="font-size:9px;fill:#222;letter-spacing:.12em">INTERLOCKING SYSTEM</text>

  <rect class="cbox" id="bx-gd" x="38" y="70" width="112" height="36" rx="4"/>
  <text class="clbl" id="lb-gd" x="94" y="88">גרופ מוקדם</text>

  <rect class="cbox" id="bx-gm" x="38" y="126" width="112" height="36" rx="4"/>
  <text class="clbl" id="lb-gm" x="94" y="144">גרופ ראשי</text>

  <rect class="cbox" id="bx-db1" x="170" y="58" width="44" height="260" rx="4"/>
  <text class="clbl" id="lb-db1" x="192" y="188" transform="rotate(-90,192,188)">DB BOARD</text>

  <path class="wire" id="w-gd" d="M150 88 H170"/>
  <path class="wire" id="w-gm" d="M150 144 H170"/>

  <rect class="cbox" id="bx-db2" x="355" y="355" width="44" height="148" rx="4"/>
  <text class="clbl" id="lb-db2" x="377" y="429" transform="rotate(-90,377,429)">DB BOARD</text>

  <path class="wire" id="w-1" d="M192 318 V480 H355"/>

  <rect class="pole" x="610" y="35" width="7" height="515"/>

  <rect class="cbox" id="bx-id" x="591.5" y="285" width="44" height="140" rx="4"/>
  <text class="clbl" id="lb-id" x="613.5" y="355" transform="rotate(-90,613.5,355)">INSERT BOX</text>

  <path class="wire" id="w-2a" d="M399 400 H591.5 V370"/>

  <path class="wire" id="w-2b" d="M399 458 H1000"/>

  <path class="wire" id="w-3" d="M613.5 285 V226"/>

  <rect class="scase" x="555" y="62" width="117" height="164" rx="10"/>

  <circle class="lens" id="d-top-y" cx="595" cy="108" r="19"/>
  <circle class="lens" id="d-top-g" cx="645" cy="108" r="19"/>
  
  <circle class="lens" id="d-bot-y" cx="582" cy="160" r="19"/>
  <circle class="lens" id="d-bot-g" cx="632" cy="160" r="19"/>

  <text class="clbl" x="613.5" y="242">DISTANT SIGNAL</text>

  <line x1="632" y1="262" x2="1196" y2="262"
        stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="4 2"
        marker-start="url(#aL)" marker-end="url(#aR)"/>
  <text class="clbl" x="914" y="250" style="font-size:10px;fill:#444">&gt;1000m BREAKING DISTANCE</text>

  <rect class="cbox" id="bx-db3" x="1000" y="355" width="44" height="148" rx="4"/>
  <text class="clbl" id="lb-db3" x="1022" y="429" transform="rotate(-90,1022,429)">DB BOARD</text>

  <path class="wire" id="w-4" d="M1044 400 H1191.5 V370"/>

  <rect class="pole" x="1210" y="35" width="7" height="515"/>

  <rect class="cbox" id="bx-im" x="1191.5" y="285" width="44" height="140" rx="4"/>
  <text class="clbl" id="lb-im" x="1213.5" y="355" transform="rotate(-90,1213.5,355)">INSERT BOX</text>

  <path class="wire" id="w-5" d="M1213.5 285 V242"/>

  <rect class="scase" x="1178" y="60" width="71" height="182" rx="7"/>
  <circle class="lens" id="m-red"    cx="1213.5" cy="100" r="21"/>
  <circle class="lens" id="m-yellow" cx="1213.5" cy="151" r="21"/>
  <circle class="lens" id="m-green"  cx="1213.5" cy="202" r="21"/>
  <text class="clbl" x="1213.5" y="258">MAIN SIGNAL</text>

</svg>
</div>

<div class="bottom-panel">
  <button class="btn" onclick="prev()">◀ הקודם</button>
  <button class="btn" onclick="reset()" style="background:#101010;border-color:#1e1e1e">↺ איפוס</button>
  <div class="caption">
    <div class="cap-title" id="cap-title">מצב 0: ראשי אדום — עצור</div>
    <div class="cap-body"  id="cap-body">ראשי: אדום. מוקדם מציג אלכסון כתום (צהוב עליון + צהוב תחתון).</div>
  </div>
  <button class="btn" onclick="next()">הבא ▶</button>
</div>

<script>
let step = 0;
const TOTAL = 2;

// Arrays containing all our dynamic elements
const ALL_W = ['w-gd','w-gm','w-1','w-2a','w-2b','w-3','w-4','w-5'];
const ALL_B = ['bx-gd','bx-gm','bx-db1','bx-db2','bx-id','bx-db3','bx-im'];
const ALL_L = ['d-top-y','d-top-g','d-bot-y','d-bot-g','m-red','m-yellow','m-green'];

// Helper to wipe all active visual states
function clearAll() {
  ALL_W.forEach(id => { const e = document.getElementById(id); if(e) e.classList.remove('red','yellow','green'); });
  ALL_B.forEach(id => { const e = document.getElementById(id); if(e) e.classList.remove('ar','ay','ag'); });
  document.querySelectorAll('.clbl').forEach(e => e.classList.remove('on'));
  ALL_L.forEach(id => { const e = document.getElementById(id); if(e) e.classList.remove('lr','ly','lg'); });
}

// Applies coloring to specific Wires (W), Boxes (B), and Lenses (L)
function W(ids, c) { ids.forEach(id => { const e = document.getElementById(id); if(e) e.classList.add(c); }); }
function B(ids, c) {
  const m = { red:'ar', yellow:'ay', green:'ag' };
  ids.forEach(id => {
    const e = document.getElementById(id); if(e) e.classList.add(m[c]);
    const lb = document.getElementById(id.replace('bx-','lb-')); if(lb) lb.classList.add('on');
  });
}
function L(id, c) {
  const m = { red:'lr', yellow:'ly', green:'lg' };
  const e = document.getElementById(id); if(e) e.classList.add(m[c]);
}

// The core State Machine
function render() {
  clearAll();
  document.getElementById('step-lbl').textContent = `שלב ${step} / ${TOTAL}`;
  
  if(step === 0) {
    document.getElementById('cap-title').textContent = 'מצב 0: ראשי אדום — עצור';
    document.getElementById('cap-body').textContent = 'מצב המתנה. ראשי: אדום מלא. מוקדם מתריע עם אלכסון כתום (צהוב עליון + צהוב תחתון).';
    
    W(ALL_W, 'red'); 
    B(ALL_B, 'red');
    L('m-red', 'red');
    L('d-top-y', 'yellow'); 
    L('d-bot-y', 'yellow'); // Forms the correct left-leaning '/' orange diagonal
  }
  else if(step === 1) {
    document.getElementById('cap-title').textContent = 'מצב 1: ראשי צהוב — אזהרה / האטה';
    document.getElementById('cap-body').textContent = 'ראשי: צהוב. מוקדם מאותת במצב מעורב: ירוק עליון וכתום תחתון להכנה לעצירה.';
    
    W(ALL_W, 'yellow'); 
    B(ALL_B, 'yellow');
    L('m-yellow', 'yellow');
    L('d-top-g', 'green');  
    L('d-bot-y', 'yellow'); // Mixed warning state
  }
  else if(step === 2) {
    document.getElementById('cap-title').textContent = 'מצב 2: ראשי ירוק — מעבר חופשי';
    document.getElementById('cap-body').textContent = 'המסלול פתוח. ראשי: ירוק. מוקדם מאשר כניסה חלקה עם אלכסון ירוק (ירוק עליון + ירוק תחתון).';
    
    W(ALL_W, 'green'); 
    B(ALL_B, 'green');
    L('m-green', 'green');
    L('d-top-g', 'green');  
    L('d-bot-g', 'green'); // Forms the correct right-leaning '/' green diagonal
  }
}

// Navigation Controls
function next()  { if(step < TOTAL) { step++; render(); } }
function prev()  { if(step > 0) { step--; render(); } }
function reset() { step = 0; render(); }

document.addEventListener('keydown', e => {
  if(e.code === 'ArrowRight' || e.code === 'Space') next();
  if(e.code === 'ArrowLeft') prev();
  if(e.code === 'Escape') reset();
});

// Initialize first frame
render();
</script>
</body>
</html>
