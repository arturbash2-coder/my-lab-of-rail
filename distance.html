<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>מעבדה דיגיטלית - סימנור מוקדם (אלכסונים מקבילים)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&display=swap');

    body { 
      background: #1a1a1e; 
      font-family: 'Heebo', sans-serif; 
      color: #e8e2d8; 
      min-height: 100vh; 
      margin: 0; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center; 
    }

    .signal-mast { fill: #2a2a2e; stroke: #4a4840; stroke-width: 2; }
    .signal-bg { fill: #121215; stroke: #3a3830; stroke-width: 1; rx: 6; }
    .lens { fill: #1a1a1e; stroke: #000; stroke-width: 2; transition: all 0.3s ease-in-out; }
    
    /* אפקטים של תאורה מקצועית */
    .lens.yellow.active { fill: #ffcc00; filter: drop-shadow(0 0 15px #ffcc00); }
    .lens.green.active { fill: #33cc33; filter: drop-shadow(0 0 15px #33cc33); }

    /* עיצוב פאנל כפתורים */
    .controls {
      margin-top: 40px;
      display: flex;
      gap: 15px;
      background: #121215;
      padding: 15px 25px;
      border-radius: 8px;
      border: 1px solid #333;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    }

    button {
      background: #2a2a2e;
      color: white;
      border: 1px solid #555;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Heebo', sans-serif;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover { background: #4a4840; transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    button.btn-red:hover { border-color: #ffcc00; color: #ffcc00; }
    button.btn-yellow:hover { border-color: #a8d08d; color: #fff; }
    button.btn-green:hover { border-color: #33cc33; color: #33cc33; }
  </style>
</head>
<body>

  <svg width="400" height="400" viewBox="0 0 400 400">
    <rect class="signal-mast" x="195" y="20" width="10" height="380" />
    
    <rect class="signal-bg" x="135" y="40" width="130" height="150" />
    
    <circle class="lens yellow" id="ds-top-org" cx="185" cy="75" r="16" />
    <circle class="lens green" id="ds-top-grn" cx="235" cy="75" r="16" />
    
    <circle class="lens yellow" id="ds-bot-org" cx="165" cy="145" r="16" />
    <circle class="lens green" id="ds-bot-grn" cx="215" cy="145" r="16" />
    
    <text x="200" y="220" font-size="12px" font-weight="bold" fill="#9a9488" text-anchor="middle" font-family="DM Mono">DISTANT SIGNAL</text>
  </svg>

  <div class="controls">
    <button class="btn-red" onclick="setDistantSignal('RED')">ראשי אדום (מוקדם: אלכסון כתום)</button>
    <button class="btn-yellow" onclick="setDistantSignal('YELLOW')">ראשי צהוב (מוקדם: מעורב)</button>
    <button class="btn-green" onclick="setDistantSignal('GREEN')">ראשי ירוק (מוקדם: אלכסון ירוק)</button>
  </div>

  <script>
    function setDistantSignal(mainState) {
      // כיבוי כל המנורות לקראת שינוי
      document.querySelectorAll('.lens').forEach(lens => lens.classList.remove('active'));

      // הדלקה לפי המצב הלוגי
      if (mainState === 'RED') {
        // מדליק את 2 הכתומות (יוצר אלכסון כתום)
        document.getElementById('ds-top-org').classList.add('active');
        document.getElementById('ds-bot-org').classList.add('active');
      } 
      else if (mainState === 'YELLOW') {
        // מצב מעורב: כתום למטה וירוק למעלה (או הפוך, לבחירתך)
        document.getElementById('ds-top-grn').classList.add('active');
        document.getElementById('ds-bot-org').classList.add('active');
      } 
      else if (mainState === 'GREEN') {
        // מדליק את 2 הירוקות (יוצר אלכסון ירוק)
        document.getElementById('ds-top-grn').classList.add('active');
        document.getElementById('ds-bot-grn').classList.add('active');
      }
    }

    // הפעלה ראשונית
    setDistantSignal('RED');
  </script>

</body>
</html>
